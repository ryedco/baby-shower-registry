<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peanut - Product Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #2a2520;
      --text: #e8e2da;
      --text-light: #b0a89e;
      --sage: #8fa88a;
      --sage-dark: #a3c296;
      --blush: #c47070;
      --accent: #d4b88a;
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #1a1715 0%, #2a2520 40%, #332e28 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(143,168,138,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(196,112,112,0.12) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 80%, rgba(212,184,138,0.1) 0%, transparent 50%);
      animation: bgShift 15s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes bgShift {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .container {
      max-width: 900px;
      width: 90%;
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 40px 20px;
    }

    /* Floating hearts */
    .heart {
      position: fixed;
      font-size: 24px;
      opacity: 0;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
        transform: translateY(90vh) rotate(45deg) scale(1);
      }
      90% {
        opacity: 0.8;
        transform: translateY(-10vh) rotate(360deg) scale(1);
      }
      100% {
        transform: translateY(-20vh) rotate(405deg) scale(0);
        opacity: 0;
      }
    }

    .heart:nth-child(1) { left: 10%; animation-delay: 0s; color: #c47070; }
    .heart:nth-child(2) { left: 25%; animation-delay: 2s; color: #d08080; font-size: 18px; }
    .heart:nth-child(3) { left: 40%; animation-delay: 4s; color: #b85555; font-size: 28px; }
    .heart:nth-child(4) { left: 60%; animation-delay: 1s; color: #c47070; font-size: 20px; }
    .heart:nth-child(5) { left: 75%; animation-delay: 3s; color: #d08080; }
    .heart:nth-child(6) { left: 90%; animation-delay: 5s; color: #b85555; font-size: 22px; }
    .heart:nth-child(7) { left: 15%; animation-delay: 6s; color: #c47070; font-size: 26px; }
    .heart:nth-child(8) { left: 85%; animation-delay: 7s; color: #d08080; font-size: 19px; }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(143,168,138,0.25) 0%, rgba(163,194,150,0.15) 100%);
      border: 1.5px solid rgba(143,168,138,0.4);
      border-radius: 50px;
      padding: 8px 24px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage-dark);
      margin-bottom: 24px;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.1;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .version {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--sage-dark);
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .ultrasound-container {
      max-width: 500px;
      margin: 0 auto 32px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(143,168,138,0.2);
      animation: scaleIn 1s ease-out 0.6s both;
      position: relative;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .ultrasound-container img {
      width: 100%;
      height: auto;
      display: block;
      background: #0a0a0a;
    }

    .glow-effect {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(143,168,138,0.15) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .release-date {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      margin-bottom: 16px;
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }

    .release-date span {
      display: inline-block;
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      font-size: 1.15em;
    }

    .subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--text-light);
      margin-bottom: 48px;
      line-height: 1.6;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 0.8s ease-out 1s both;
    }

    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #7a9a6e 0%, #5e8050 100%);
      color: #fff;
      font-size: clamp(1rem, 2.5vw, 1.1rem);
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(90,128,80,0.4);
      transition: all 0.3s ease;
      animation: fadeInUp 0.8s ease-out 1.2s both;
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(90,128,80,0.5);
    }

    .cta-button:hover::before {
      opacity: 1;
    }

    .cta-button:active {
      transform: translateY(-1px);
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 2s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .sparkle:nth-child(odd) {
      animation-delay: 0.5s;
    }

    /* Made with love footer */
    .footer {
      margin-top: 60px;
      font-size: 0.85rem;
      color: var(--text-light);
      opacity: 0.7;
      animation: fadeIn 1s ease-out 1.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.7; }
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .container {
        padding: 20px 15px;
      }

      .badge {
        font-size: 0.65rem;
        padding: 6px 18px;
      }

      .ultrasound-container {
        max-width: 100%;
        border-radius: 15px;
      }

      .cta-button {
        padding: 16px 40px;
        width: 100%;
        max-width: 320px;
      }

      .heart {
        font-size: 18px;
      }

      .heart:nth-child(3) { font-size: 22px; }
      .heart:nth-child(7) { font-size: 20px; }
    }
  </style>
</head>
<body>
  <!-- Floating hearts -->
  <div class="heart">💗</div>
  <div class="heart">💕</div>
  <div class="heart">💖</div>
  <div class="heart">💗</div>
  <div class="heart">💕</div>
  <div class="heart">💖</div>
  <div class="heart">💗</div>
  <div class="heart">💕</div>

  <!-- Sparkles -->
  <div class="sparkle" style="top: 15%; left: 12%;"></div>
  <div class="sparkle" style="top: 25%; left: 88%;"></div>
  <div class="sparkle" style="top: 65%; left: 8%;"></div>
  <div class="sparkle" style="top: 75%; left: 92%;"></div>
  <div class="sparkle" style="top: 45%; left: 5%;"></div>
  <div class="sparkle" style="top: 55%; left: 95%;"></div>

  <div class="container">
    <div class="badge">Coming Soon</div>

    <h1>Peanut</h1>
    <div class="version">The Next Generation</div>

    <div class="ultrasound-container">
      <img src="peanut-2.0.png" alt="Ultrasound of Baby Peanut">
      <div class="glow-effect"></div>
    </div>

    <div class="release-date">
      🎯 Target Release Date: <span>May 2, 2026</span>
    </div>

    <p class="subtitle">
      After months of development, we're excited to announce our most ambitious project yet.
      Registry now open.
    </p>

    <a href="index.html" class="cta-button">
      Click Here to Continue to Registry
    </a>

    <div class="footer">
      Made with love by Peixin & Ryan
    </div>
  </div>

  <script>
    // Add subtle parallax effect to ultrasound on mouse move
    document.addEventListener('mousemove', (e) => {
      const container = document.querySelector('.ultrasound-container');
      const { innerWidth, innerHeight } = window;
      const x = (e.clientX / innerWidth - 0.5) * 20;
      const y = (e.clientY / innerHeight - 0.5) * 20;
      container.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    // Reset on mouse leave
    document.addEventListener('mouseleave', () => {
      const container = document.querySelector('.ultrasound-container');
      container.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
    });

    // Create random sparkles on button hover
    const button = document.querySelector('.cta-button');
    let sparkleInterval;

    button.addEventListener('mouseenter', () => {
      sparkleInterval = setInterval(() => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = `${button.offsetLeft + Math.random() * button.offsetWidth}px`;
        sparkle.style.top = `${button.offsetTop + Math.random() * button.offsetHeight}px`;
        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 2000);
      }, 200);
    });

    button.addEventListener('mouseleave', () => {
      clearInterval(sparkleInterval);
    });
  </script>
</body>
</html>
